<html>

<head>

<style>

.card{
width:300px;
padding:20px;
border:2px solid black;
margin:100px auto;
animation:slide 3s infinite alternate;
}

@keyframes slide{
from{transform:translateX(0px);}
to{transform:translateX(200px);}
}

</style>

</head>

<body>

<h2>Patient Record</h2>

<div class="card">

<p>Name: Gunali</p>
<p>Doctor: Dr Kumar</p>
<p>Department: Cardiology</p>

</div>

</body>

</html>
